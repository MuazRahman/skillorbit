name: skillorbit
description: "A modern AI based learning app built by 'Skill Orbit' using Flutter and Firebase."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.7.2

  # Google Fonts
  google_fonts: ^8.1.0

  cupertino_icons: ^1.0.8

  # Add Firebase Core (Required for all Firebase services)
  firebase_core: ^3.8.0

  # Add Firestore (Cloud Firestore Database)
  cloud_firestore: ^5.5.0

  # Add Firebase Authentication
  firebase_auth: ^5.3.3
  
  # Add Firebase Storage
  firebase_storage: ^12.4.10

  # SVG Image Support
  flutter_svg: ^2.0.0+1

  # Image Picker
  image_picker: ^1.0.7
  
  # URL Launcher
  url_launcher: ^6.2.5
  
  # YouTube Player
  youtube_player_flutter: ^9.1.3

  # Flutter Launcher Icons
  flutter_launcher_icons: ^0.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_logo.png"
  adaptive_icon_background: "#4CAF50"
  adaptive_icon_foreground: "assets/logo/app_logo.png"